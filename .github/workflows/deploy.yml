name : ORC Production Deployment
on :
    push:
        branches:
            - main

permissions:
    id-token : write
    contents : read

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            
            #checkout repository
            - name: Checkout Repository
              uses: actions/checkout@v4

            # Setup Python
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'

            # Install validation tools
            - name: Install Dependencies
              run: |
                pip install flake8

            #Python Lint Validation
            - name: Run flake8
              run: |
                flake8 orc_lambda_codes/

            #Sonarqube Static Analysis
            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v2
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}

            #Setup Terraform
            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            #Terraform INIT
            - name: Terraform Init
              run: |
                cd terraform
                terraform init

            #Terraform format validation
            - name: Terraform Format Check
              run: |
                cd terraform
                terraform fmt -check

            #Terraform Validation
            - name: Terraform Validate
              run: |
                cd terraform
                terraform validate

            # Terraform security scan
            - name: Terraform Security Scan
              uses: aquasecurity/tfsec-action@v1

            # Configure AWS credentials using OIDC
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::123456789012:role/github-oidc-role
                aws-region: us-east-1

            # Login to ECR
            - name: Login to Amazon ECR
              uses: aws-actions/amazon-ecr-login@v2

            # Build Docker image
            - name: Build Docker Image
              run: |
                docker build -t orc-input-validation ./orc_lambda_codes/input_validation_lambda

            # Tag Docker image
            - name: Tag Docker Image
              run: |
                docker tag orc-input-validation:latest \
                123456789012.dkr.ecr.us-east-1.amazonaws.com/orc-input-validation:latest

            # Push image to ECR
            - name: Push Docker Image
              run: |
                docker push 123456789012.dkr.ecr.us-east-1.amazonaws.com/orc-input-validation:latest

            # Terraform plan
            - name: Terraform Plan
              run: |
                cd terraform
                terraform plan -out=tfplan

            # Upload Terraform plan
            - name: Upload Terraform Plan
              uses: actions/upload-artifact@v4
              with:
                name: tfplan
                path: terraform/tfplan

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: production
        
        steps:
            # Checkout repository
            - name: Checkout Repository
              uses: actions/checkout@v4

            # Download Terraform plan
            - name: Download Terraform Plan
              uses: actions/download-artifact@v4
              with:
                name: tfplan
                path: terraform/

            # Configure AWS credentials
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::123456789012:role/github-oidc-role
                aws-region: us-east-1

            # Setup Terraform
            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            # Terraform Init
            - name: Terraform Init
              run: |
                cd terraform
                terraform init

            # Terraform Apply
            - name: Terraform Apply
              run: |
                cd terraform
                terraform apply -auto-approve tfplan

            # Deployment verification
            - name: Verify Lambda Deployment
              run: |
                aws lambda list-functions



